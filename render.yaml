services:
  - type: web
    name: cinematch-ai
    env: python
    region: singapore
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python train_model.py
    startCommand: gunicorn app:app --workers 1 --timeout 120
    envVars:
      - key: TMDB_API_KEY
        value: your_tmdb_api_key_here
      - key: SECRET_KEY
        value: cinematch_syntecxhub_2024
